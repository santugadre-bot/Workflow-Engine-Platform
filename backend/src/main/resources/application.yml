spring:
  profiles:
    active: dev
  application:
    name: workflow-engine

  datasource:
    # Master (Writer)
    url: jdbc:postgresql://localhost:5432/workflow_engine
    username: postgres
    password: santu@8496
    driver-class-name: org.postgresql.Driver
    
    # Connection Pool Settings (HikariCP)
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000
      pool-name: WorkflowHikariPool

    # Read Replica (Placeholder for Future Split)
    # reader:
    #   url: jdbc:postgresql://replica-host:5432/workflow_engine
    #   username: read_only_user

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false # Disable Open-Session-In-View for performance
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50 # Batch inserts/updates
        order_inserts: true  # Group INSERTs by entity type for true JDBC batching
        order_updates: true  # Group UPDATEs by entity type for true JDBC batching

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

server:
  port: 8080

app:
  jwt:
    secret: workflow-engine-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
    access-token-expiration-ms: 31536000000      # ~1 year
    refresh-token-expiration-ms: 604800000  # 7 days

  cors:
    allowed-origins: http://localhost:5173,http://localhost:5174,http://localhost:5175,http://192.168.1.14:5173,http://192.168.1.14:5174,http://192.168.1.14:5175

  upload:
    dir: ./uploads
